name: tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Lint (ruff)
        run: |
          uv run ruff check src tests scripts
          uv run ruff format --check src tests scripts

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Run tests
        run: >-
          uv run pytest
          --junitxml=junit.xml
          --cov
          --cov-report=term-missing
          --cov-report=xml

      - name: Coverage summary
        if: ${{ !cancelled() }}
        run: |
          {
            echo '## Coverage'
            echo
            echo '```'
            uv run coverage report --show-missing
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Publish test report
        uses: mikepenz/action-junit-report@v6
        if: ${{ !cancelled() }}
        with:
          report_paths: junit.xml
          check_name: pytest results
          detailed_summary: true
          include_passed: true

      - name: Install gotestsum
        if: ${{ !cancelled() }}
        run: go install gotest.tools/gotestsum@latest

      - name: Run Go tests
        if: ${{ !cancelled() }}
        run: |
          for mod in src/golang/*/; do
            name=$(basename "$mod")
            echo "==> $mod"
            (cd "$mod" && gotestsum \
              --junitfile "$GITHUB_WORKSPACE/go-junit-$name.xml" \
              --format testname -- ./...) || true
          done

      - name: Publish Go test report
        uses: mikepenz/action-junit-report@v6
        if: ${{ !cancelled() }}
        with:
          report_paths: go-junit-*.xml
          check_name: go test results
          detailed_summary: true
          include_passed: true
          fail_on_failure: true

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: test-results
          path: |
            junit.xml
            coverage.xml
            go-junit-*.xml
          retention-days: 7
