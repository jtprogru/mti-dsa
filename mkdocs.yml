site_name: mti-dsa — Алгоритмы и структуры данных
site_description: Лабораторные работы и конспект по алгоритмам и структурам данных
site_author: Mikhail Savin
site_url: https://jtprogru.github.io/mti-dsa/

repo_name: jtprogru/mti-dsa
repo_url: https://github.com/jtprogru/mti-dsa
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  language: ru
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Тёмная тема
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Светлая тема
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.footer
    - toc.follow
    - content.code.copy
    - search.suggest
    - search.highlight

nav:
  - Главная: index.md
  - Конспект: notes.md
  - common — общие утилиты: common.md
  - lab01 — массив и стек: lab01.md
  - lab02 — список, очередь, дерево: lab02.md
  - lab02_random — баланс: lab02_random.md
  - lab03 — сортировки: lab03.md
  - lab04 — поиск: lab04.md
  - lab05 — hash map: lab05.md

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search:
      lang: ru
